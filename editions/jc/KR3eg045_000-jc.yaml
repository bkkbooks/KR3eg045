body:
  text: 跋一安政戊午暴瀉病盛行東京中死者以萬數醫人往往束手得其肯綮者甚鮮友人高島祐啟父祐庵翁潛思沉研用硝黃活人者甚夥於是著瀉疫新論其說率據吳有性蓋能得吳氏之精髓而脫胎換骨者矣余嘗謂此病千篇一律無大異同則必有明眼如炬之士能得其巢窟者今讀此編始知攻下之有大益於此病然劉張得之於瀉李朱得之於補各有所長猶減灶增灶而不失良將之名則知其際必有得於補者但世好補者多而好瀉者少則此編當為好補者之頂門一針矣因跋明治十二年九月山田業廣跋二瀉疫新論二卷祖考停雪先生日試月驗之所得也距今蓋二十有一年矣當時未暇梓以問世而祖考易簀書亦委在筐底近歲此症屢行與家君東馳西走得實驗不少焉近日有司憐民之罹斯病者多為設避病院施預防法苟有病者必令醫吏檢其真疑抑亦可謂仁之至德之治者哉且使醫遇斯病速以書報官勿得移時或誤診視若移時不報者納金贖罪法亦極嚴於是人不啻恐罹斯病乃醫亦窮蹙無容蓋以疾之險惡而難於施治也余家常以此書為治疫之標準從遊者逐次謄寫原稿且斷爛今也天下之醫悉奉載聖旨之厚不可不盡其術之秋則將授剞厥於是家君更為增訂皆所以紹述祖考之意而庶幾有補於國家衛生之萬一云明治十二稔九月高島久敬軌謹識

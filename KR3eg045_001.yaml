body:
  text: 卷上異域傳染瀉疫也者吳氏所謂雜氣之類而傳自羌戎久也案吳氏曰雜氣者雖曰天地之氣實由方土之氣也蓋其氣從地而起有是氣則有是病譬如所言天地生萬物然亦由方土之產也而匪我豐葦原中國所固有也猶麻疹之傳於百齊事詳見日本紀敏達帝十四年痘瘡之傳於新羅事詳續日本紀𮅟宣抄聖武帝天平七年並續古事談等非特我也痘瘡之傳於西域事詳見外臺黴毒之來於嶺南按陳九韶曰黴痘一症古未言及明季起嶺南之地至使蔓延通國又按俞辨醫說云弘治末年民間患惡瘡自廣東始吳人不識呼為廣瘡據此則傳於廣東番沙之起於漠北案張路玉醫通曰番者感惡毒異氣而驟發黑沙此病起漠北流入中原故以番沙目之在支那亦然是亦不足徵焉乎哉比歲互市相開米利干魯細亞佛蘭之屬陸續來往而與邦人雜居以故傳此惡毒之氣也日熾月增耳其實不昉於今也或云此疾起於鎮西正德年間小兒感冒最多漸次流傳及於尾陽之地大人亦適有感焉人呼曰早手比之颶風之猝然至也爾後築之前後年年有之案說見於今時醫談又築人鷹取遜庵有小兒暴利新考又云文政壬午秋此疫行浪華其初亦起於鎮西案詳見於時還讀我書或云初傳於肥前長崎時有米夷舟中患此者多滯留崎港死者枕籍爾後蔓延四方以是觀之為異域傳染之惡疾豈不足徵焉乎或云子之說博且辨矣然吾有未信焉夫古先哲王之有事於高麗也百濟新羅任那之客來往留滯厥後又有遣唐之使留學之生北條氏之時蒙古大舉入寇至如近世諸蕃之信使常在焉然而未曾聞輒帶惡疾異瘡來也若彼痘麻氣運所為適生其時而世俗遂誤認為異域傳染之疾耳夫疾病之起本五氣之錯攝養之差然則變症奇恙何事不有何必歸咎於彼余答曰子知其一而未知其二凡凶戾惡暴之氣不起於中土而起於偏土夷狄如嶺南瘴煙之起如墨北風沙搏成瘡況羌戎偏之又偏者耶若我日本亦雖偏於東乎然帝出乎震精華沖粹之氣所鍾男女之肌肉秀麗迥非漢蕃之所及故古者異邦指我為蓬瀛神州為東方君子國有以也夫況忠義者其所性焉振古奉一姓之皇統無篡奪革命之事其所生禽獸蟲魚草木金石皆良淳而毒於人者至少矣縱令陰陽不和寒暑錯行無凶戾暴惡之邪氣以厲於人也如羌戎君臣父子之禮異唯利是務其所產禽獸蟲魚草木金石酷毒者多是蓋陰陽偏勝之氣使之然也故其地氣發而作邪也必凶戾惡暴矣中土之人適感此氣則以人傳人延蔓不絕古先哲王有見於此故有蕃客朝京師必秡祭道路以除不祥有若延喜式所云者案延喜神祗式臨時祭有唐客入京路次神祭又有蕃客送堺神祭云右蕃客入朝迎畿內堺祭卻送神其客徒等比至京城給祓麻令除乃入又有障神祭云右客等入京前二日京城四隅為障神祭蓋恐異氣厲氛或傳染於邦人以貽患也今也華戎雜居往來如市宜其有是也第其一經傳染其氣潛匿伏藏閭巷山林之間遇歲運之偏勝寒暑之失節輒復發作或漸與土氣和與人身諳則其邪氣漸薄永作我土常有之疾世人見其如此認為我家之賊而不知他家之賊來害我也豈不謬而子亦何然也大疫之歲宜清解逐穢吳氏之說疫專論三陽不及三陰治法專舉清解逐穢遺溫熱補氣是以後世劉松峰以下數家僉譏其偏於一而不備也予謂吳氏之於疫偏則偏矣然原繫於實驗之言松峰以下之言備則備矣但屬紙上之摸索何則傷寒有陽症有陰症故治方亦有清解有溫補焉尤宜然也若夫瘟疫概屬陽症陰症百中之一二耳故治法亦以清解逐穢為主況於大疫之歲乎夫大疫之熾而毒也如火之燎於原炎炎張天而寸草靡遺如水之決堤防而衝突潰裂萬室蕩盡如流賊之鈔略殺戮屠創及嬰孩雞犬蓋天地殺氣之所為焉而與平素尋常之疫迥然異矣故人之感之也無論老稚強弱滿腔子盡化為熱雖四損之人一焉而已是以清解逐穢之益多而溫熱補氣之害多若平素之疫邪氣緩且薄故隨其老稚強弱寒熱異症間或有驗之三陰而可溫補者矣如吳氏身逢崇禎辛巳之大疫乃以平日所歷驗方法著溫疫論而後人反欲以平素之疫律之是大不然也若去歲以來盛行瀉疫雖吳氏之所遭異症乎而其為熱毒則同也此余以主張清解逐穢不用溫劑也楊慄山著寒濕條辨專以大運論其理雖與予說若有異而趣則一也今立寒溫異時之辨以載之於後條寒熱因時或熱症余前論大疫流行也亡論耄倪與天資強弱舉屬熱症然而未及運氣也運氣之說昉於楊慄山余未知其是非然亦不可謂無此理矣疫勢之衰弱瀉疫之傳染歲久漸與中土及人身之氣習慣則凶焰稍薄於此乎或有屬寒症者第余之謂寒熱因時異症則圓活而彼之因時異症則畫定姑揭之於下矣楊慄山曰嘗稽東垣李氏一以補中為主丹溪朱氏一以滋陰為重載人張氏一以盪滌為先皆能表表於世總得挈領提綱故合一本萬殊之妙不則當年豈無歲氣而必各取其一耶再以痘疹言之有扼要於保元有獨取於辛溫有得意於清瀉是亦治痘之名乎何不見有逐年之分別耶要知天運之使然非三氏之偏僻也如曰偏僻則當年各操其一以應世何以得各擅其勝乎後學不明其故各效其一而不通變亦有畏其偏僻而第據症按時侈談歲氣以示高卓皆不知循環之大運者也餘留心此道年近四旬鄉闈已經匙困肇於乾隆九年甲子猶及謝事寒水天運證多陰寒洽多溫補縱有毒火之症亦屬強弩之末自茲已後而陽火之症漸漸多矣尚濕補宜重者變而從輕清瀉宜輕者變而從重殆及甲戌乙亥所宜重瀉者雖極清極解而亦弗驗矣勢必盪滌而元梟之勢始殺至甲申乙酉盪滌之法向施初病者多有首尾而難免者矣歷年以來居然成一定局間有溫補者十一千百而已是大運轉於相火矣凡時行之如正傷寒與冬溫暑溫風溫濕溫秋溫飧瀉痎瘧燥咳吐痢霍亂並男婦小兒一切諸症及痘疹民病火病十八九何況溫病從無陰症得天地疵癘旱潦之氣其流毒更甚於六淫又豈寒水司火運者之所可同年語哉自古運氣靡常純駁無定病故變態靡常補瀉無定今之非昔可知後之非今先聖後聖其揆一也易地則皆然矣任胸臆者漸漸不能彷彿余於當事時懷冰競惟恐偏僻致誤庶幾屢經屢驗差可自信亦有莫挽者明知其逆不必治不過熱腸所迫耳寒溫條辨戒發表瘟疫與傷寒不同何也瘟疫不客於表而直入於裡縱有表症不可發表發表必有害是前輩既有定論非我私言也況瀉疫瘟疫之一種凶猛者往往舌上發苔之未及而上吐下瀉忽然長夜其凶焰若斯者邪但其間偶有緩慢之症見一二表症者其淵源斷不在表也世醫往往引太陽陽明合病之說投葛根湯者有之又為協熱下利而投葛根芩連等者有之夫葛根湯原系治太陽表症之方而今茲症初無表症焉況方中有桂枝之辛溫此症之所忌者乎又若協熱利又未睹若斯之凶暴也故誤用此等方劑者是所謂助桀為暴之類也且比之用溫補固澀之劑者其害雖差輕要之五十步百步之異耳俱非適當之治也今又舉楊慄山之說以告世之汲汲於發表者楊慄山曰傷寒風寒外入但有一毫表症自當發汗解肌消散而愈其用藥不過麻黃桂枝葛根柴胡之類在溫病邪熱內攻凡見表症皆里症鬱結浮越於外也雖有表症實無表邪斷無正發之理故傷寒以發表為先溫病以清裡為主此一著最為緊要關隘今人一遇溫病便以為傷寒遂引以論先解其表乃攻其里之說此大謬也總因古今醫家俱將濕病與傷寒看成一症不分兩治加王宇泰張景岳曠代名手也其論傷寒症治妙矣至矣蔑以加矣至說到溫病猶是老生常談他何足道人每以大劑麻黃葛根等湯強發其汗此邪原不在經汗之徒損經氣熱亦不減轉見狂燥蓋發汗之理由中以達外今裡熱結滯陽氣不能敷布於外即四肢未免厥逆又安能氣液蒸蒸以透表如縛足之鳥焉能飛昇又如水注之器閉其後竅前竅焉能涓滴惟用升降雙解裡熱一清表氣自透不待發散多有自能汗解者此中玄妙王劉二公其先覺乎寒溫條辨久也案湯滌一投隨發疹者此理也學者宜體認焉劉松峰曰每見治溫熱病誤攻其里尚無大害誤發其表變不可言衛遜亭曰此足見瘟病斷無發散之理至云攻裡尚無大害當重看大字說疫論下法夫傷寒之邪自皮膚入客於表瘟疫之邪自鼻口入著於裡故傷寒在初要發表瘟疫初起便宜攻下先輩論之詳矣況此疾瘟疫中最至厲至暴之邪者耶故一咸之則直走於腸胃而驅逐一身之津液從大腸而逆出流離藏府轉輸之機遏絕不行若不速施下奪之法則毒邪內蘊恣其梟惡復上奔為吐眼陷頰削津液枯涸而弊只恐攻下之不速矣予去秋以來所歷試單明全在於此而人往往咎悖於傷寒之治法因今舉先輩論攻下之說一二條以證予治之有所本矣戴麟郊曰時疫下法與傷寒不同傷寒下不嫌遲時疫下不厭早傷寒在下其燥結時疫在下其鬱熱傷寒里症當下必待表症全罷時疫不論表邪罷與不罷但兼里症即下傷寒上焦有邪不可下必待結在中下二焦方可下時疫上焦有邪亦可下若必待結至中下二焦始下則有下之不通而死者傷寒一下即已仲景承氣諸方多不過三劑時疫用下藥至少三劑多則有一二十劑者廣溫疫論周枸元曰考內經云瘟病刺五十九穴以瀉熱明乎瘟病當以瀉熱為急後人因之而立下奪之法本即內經之意而變通之蓋瘟熱內蘊津液受傷雖在初起之時急宜攻下萬勿泥傷寒先表后里之說昔賢謂瘟病下不厭早誠至言也下之者使邪即出無停留之意故瘟病服攻利之後必有水沫隨大解澼澼出邪輕者色黃重者色赤劇者色黑此即無形之熱邪下瀉原不拘於結糞之有無若必待痞滿實痛而始行攻逐不亦晚乎瘟症指歸又曰瘟邪下法原為瀉熱而設本不拘於結胸之有無故下不厭早亦不拘於表症之解與未解即便當下蓋瘟邪由里達表必裡氣通而表汗始得每有下至一二次或五六次甚至十數次者惟以邪淨而後已同又曰瘟病之邪伏而後發不以風寒外感可一汗而已是以瘟病投涼下之劑多有病勢猖獗昧者詫為錯治每每更醫換藥致誤不知伏邪猶之伏匿之火揚之則焰起非大下疊下焉能勝此燎原之勢常有石膏用至數斤大黃用至數兩首尾不徹始獲全功者大抵瘟邪傳變不一非一下即能淨盡古人原有如剝蕉心之喻其邪勢輕者一二劑即愈重者非疊下不效若畏藥峻猛怯不透下欲不至腐腸爛胃者幾希矣醫者惟見真守定方無妄治之虞孫真人曰膽欲大而心欲細其斯之謂歟同吳又可曰大凡客邪貴乎早逐乘人氣血未亂肌肉未消津液未耗病人不至危殆投劑不至掣肘愈後亦易平復欲為萬全之功策者不過知邪之所在早拔病根為要耳瘟疫論暴解之後忌溫劑夫瘟疫原熱病故首尾忌溫熱之藥況此疾熱毒之極故雖有厥冷脈伏等症不可妄用溫熱之藥治法中既論之詳如其瀉斷後亦不可犯之則必俄頃變出不測或終一瞑長夜不可不慎矣吳又可曰夫疫乃熱病也邪氣內郁陽氣不得宣布積陽為火陰血每為熱搏暴解之後余焰尚在陰血未復大忌參耆白朮得之反助其壅鬱餘邪留伏不惟目下淹纏日後變生異症或周身痛痹或四肢攣急或流火結痰或遍身瘡瘍或兩腿鑽痛或勞嗽湧淡或氣毒流注或痰核穿漏皆驟補之為害也凡有陰枯血燥者宜清燥養榮湯若素多痰及少年平時肥盛者投之恐有泥膈之弊亦宜斟酌大抵時疫愈後調理之劑投之不當莫如靜養節飲食為第一瘟病論楊慄山曰按瘟病乃天地雜氣之一也有邪不除淹纏日久必至虛羸庸工望之不問虛實久暫可否輒用人參殊不知無邪不病邪去而正氣自通何慮虛之不復也今妄投補劑邪氣益固正氣益郁轉瘦轉瘦轉補轉補轉郁循環不已乃至骨立而斃猶言服參幾許補之不及奈何余於乾隆甲戌乙亥丙子三年中眼見親友患溫病服參受害者不可枚舉病家止誤一人醫家終身不悟不知殺人無算特書之以為濫用人參之戒寒溫條辨又曰按仲景傷寒論用參薑桂附者八十有奇而溫病非所論也伏邪內郁陽氣不得宣布積陽為火陰血每為熱搏未解之前麻黃桂枝不可沾唇暴解之後余焰尚在陰血未復最忌參薑桂附得之反助壅鬱餘邪伏留不惟目下淹纏日後必生異症同又曰乾隆甲戌乙亥吾邑連間數年溫毒盛行眼見親友病多陽病似陰用附子理中湯而死者若而人用八味丸料及六味丸合生脈散而死者又若而人醫家病家皆以為死症難以挽回卒未有知其所以誤者余深閔焉古人格陰以陰體厥脈厥之說精心研究頗悟此理溫病無陰症傷寒陰症百中一二庸工好用熱藥且多誤補其虛故患陰症似陽者少壞事亦不若陽症似陰者之多也每參酌古訓又兼屢經閱歷實驗得陽症似陰乃火極似水陽邪閉脈非仲景所謂陽症陰脈也輒用升陰涼膈加味六一解毒承氣之屬隨症治之無不獲效不必疑也特書之以為誤認陽症陰脈之戒同張石頑曰夏秋之交傷暑霍亂大抵忌朮附薑桂種種燥熱之藥誤服必死凡夏秋霍亂有一毫口渴即是伏熱不可用溫理脾胃藥如燥渴小便不利五苓散為末本方中肉桂亦宜酌用張氏醫通疾有主客予去歲以來治病羸或老少之徒感此疾者概以清解逐穢為主莫不隨手而愈世醫遇此等症往往以洞泄為脾氣之下陷與參附以促死者甚多矣亦有適知感厲氣者顧慮其舊病尤羸縮手不敢投硝黃焉非從事於芩連梔柏即參附炙炳莫所不到不啻不能拔其本根有反助其邪炎熱勢加劇以至於死者則謂養虎貽患者矣故如此之際雖彼四損之人或有所不顧唯宜見邪熱勿見舊病尤羸噫拔本塞源尚恐其不及也奚本病之是顧耶故大柴胡湯三承氣湯之類隨見症選用之吳氏之說尤繫於實驗故抄出於此吳又可曰凡人向有他病尤羸或久瘧或內傷瘀血或吐血便血咳血男子遺精白濁精氣枯涸女人崩漏帶下血枯經閉之類以致肌肉消爍邪火獨存故脈近於數也此際稍感疫氣醫家病家見其穀食暴絕更加胸膈痞悶身疼發熱徹夜不寐指為原病加重誤以絕谷為脾虛以身痛為血虛以不寐為神虛遂投參朮歸地茯神棗仁之類愈進愈危知者稍以疫法治之發熱減半不時得睡食稍進溫疫論病症此疾有數症方其初發也有無寒熱無頭痛腹痛身痛手足厥冷等飲食起居如平生而猝然水泄如傾盆而卻覺心膈寬快者故人往往忽略不為意一二時或半日之間吐瀉頻並始疲睏著床者其常也或有吐瀉數行而飲食起居不甚變者或有吐瀉初起舌上生厚白胎者或吐瀉數行始生胎者或始終無胎者或有瀉數行後生渴飲冷水數升者或吐瀉一二行已發渴者雖渴好熱物者或有適因飲食而發者或吐或瀉一二日後吐瀉並劇始覺疲睏者或有忽然吐瀉並作暫時眼陷肉削直視聲啞手足厥冷轉筋六脈如系或沉伏全舞者其症雖輕重種種要之皆為熱症第因其人之胃氣厚薄與邪之緊慢有不同耳若其好飲熱湯雖或似虛寒此猶滯下亦有熱實之極及好沸湯者不足為異故參附炙炳一切為禁用雖桂枝幹姜亦非所宜且桂枝本解肌之藥此疾初無表邪若誤犯之則徒益嘔益瀉不如無用之愈也每見世醫誤認其外症投熱劑或炙炳者吐瀉益劇無厥者遂致厥甚則至冷過肘膝膈熱反如燎額上冷汗眼陷頰削直視上插聲嘶只欲飲冷水數升與之熱藥則愈吐不納邪氣益熾元氣益衰終不可救者有之譬如陷人於井中隨下之石何生之望而猶言服參附數劑補之無及歸之於命病家亦唯唯不為非豈其然哉殺人無算遂以無覺悟其實醫殺之也實可痛悼焉蓋此疾系毒熱之邪亦一種之厲氣而吳氏所謂雜氣之一也惟邪勢凶暴尤甚故其中人也先從鼻口入直著於腸胃而驅逐津液奔迸難制轉輸之職絕而傳導之官廢故偏滲於大腸作洞泄之症是亦熱結旁流之類也與傷寒之邪先從表以次傳者不同故初無表症矣其所下之物悉所飲食之水漿與一身之津液也故全然無糞亦無臭氣其色白濁如敗醬或如米泔若不早拔去其梟猛之邪則上吐下瀉其勢不能禁遂現前所云劇症甚至唇舌冰冷肌膚血凝青紫成片是皆陽氣鬱遏不能達於外之所致決非陰寒之症仲景所謂熱深者厥亦深者是也然而世醫不惟投熱劑兼灸天樞氣海神闕等以為適當之治是猶添薪止沸艾火雖微內攻有力況此極熱之症兩陽相搏乎仲景有火逆之戒況如此熱極之症乎又有一種粗工恐洞泄之劇欲驟止之內以阿片類固澀之外燒酒熨之芥子泥塗之是猶不逐賊而豫閉門戶家人必受害拙之尤極者也然如輕症其瀉間有斷者但多變為壞症有時時蒸熱發揭衣被纏綿引日者有變為滯下者為瘧狀者為休息痢者有為骨蒸狀者如小兒有變驚風者變疳者變馬痹風者如是之類皆醫之誤治所致也矣予去秋以來治壞症數人然本屬輕症故得救療若劇症不暇為壞症必一日或半日而死可勝嘆乎哉或問曰此症與尋常霍亂泄瀉所殊子何以辨之曰此症洞泄一行全無糞更無臭氣又無腹痛等瀉數行後肩背胸肋間蠕蠕水鳴既而腹中雷鳴瀉出如尿但肛門濕癢恰如溫湯瀉出甚則糜爛皆屬此症矣兼之煩渴引飲小便赤澀或涓滴作痛則已非尋常霍亂泄瀉是知此痰之最吃緊者若夫脈與舌苔則非知此疾之所要也而其病源所以與傷寒等不同也此疾邪勢猛烈傳變甚速故用藥不得不緊急矣設不緊急或服緩劑則症加劇而死不出一二日或數刻不見八尺健兒肩擔千斤而斃於道路乎此邪概三伏至中秋節為盛行之時其夏至前後霜降節以前雖有之其症頗緩故有多動血塊疝瘕等宿疾而腹腰等痛者不可誤為瀉疝滯食之類治之必殺人如小兒多動蛔蟲者有之亦類吐乳者有之不可不知也按此疾八月尤盛其如四五月雖適有之甚稀且邪勢未劇有一二人患之者人多以霍亂泄瀉治之而幸愈者間有焉蓋邪氣猶嫩譬火之初炎其勢雖猛易撲滅也其九月以後患之者症稍緩且多挾宿疾但其外症緩因與輕劑則變劇症者有焉然死者亦少矣蓋邪勢漸老猶火之將滅炎焰雖猛勢頗緩亦易撲滅也如七八月闔門比戶患之之時猶燎之方揚煽假令受邪輕且淺者其勢頗烈是以治法一誤則死生立判是最不可不知矣再按先如己末歲立冬後流傳猶不止但頗異於前日必多現於表症輕者吐瀉一二日或二三日後自止者亦有之或瀉止後為滯下者有之如小兒先吐乳一二日而後瀉瀉如乳汁無糞色世醫盡以中寒治之然至感之重者非硝黃其瀉不斷是所以與中寒不同也蓋夏秋人身陽氣在外中守不堅邪亦凶暴是以一入里猖獗難制傳變尤速如冬日陽氣在裡中守尤固邪亦屬強弩之末是以不得縱其凶暴故多達表而現表症雖里症亦緩而無死者故比之夏秋消黃之奏功不甚速此亦中守堅固之故也是以多服而始得效焉素常畜飲家感於此邪則瀉熱滂沛多於常人其瀉之斷又後於常人脈凡溫疫與傷寒病源不同至脈亦難以傷寒脈律之昔人云傷寒以脈為主溫病以症為主吳氏以下論瘟疫者詳於症而略於脈者亦以此也況如此疾不可以脈審定乎何以洞泄數行有脈猶與平日不異者或有沉遲者有沉微者一用大柴胡湯之類裡熱達於表則脈亦變弦數此疾之常也間初起乃弦數者浮數者種種不一而至治法非盪滌逐穢不可救此其所以脈不可拘也然脈者氣之波瀾生死之所判故全發則不可拘泥亦不可今舉楊氏之說數條者以此也楊氏曰或該從症或該從脈切勿造次此言最有理戴麟郊曰瘟疫之脈傳變後與風寒頗同初起時與風寒迥異風寒從皮毛而入一二日脈多浮或兼緊兼緩兼澀而皆浮迨傳入里始不見浮脈其至數亦清楚而不模糊瘟疫從中道而變自里出表脈始不沉乃不浮不沉而數或兼弦兼大而皆不浮其至數模糊而不清楚其初起脈沉遲勿作陰寒斷沉者邪在裡也遲者邪在陰分也脈象同於陰寒而氣色舌苔神情依前諸法辨之自不同於陰寒或數而無力亦勿作虛視緣熱蒸氣散脈不能鼓指但當解熱不宜補氣受病之因有不同故同脈而異斷也廣溫疫論楊慄山曰凡瘟病脈怫熱在中多見於肌肉之分而不甚浮若熱鬱少陰剔脈沉伏欲絕非陰脈也陽邪閉脈也寒溫條辨又曰凡溫病內外有熱其脈沉伏不洪不數但指下沉澀而小急斷不可誤為虛寒若以辛溫之藥治之反益其熱也所以傷寒多從脈溫病多從症蓋傷寒風寒外入循經傳溫病悌熱內熾溢於經也同又曰凡傷寒性本太陽發熱頭痛而脈反沉者雖曰太陽實見少陰之脈故用四逆湯溫之若溫病始發未嘗不發熱頭痛而見脈沉澀而小急此伏熱之邪滯於少陰不能發出陽分所以身大熱四肢不熱者此名厥正雜氣怫鬱火邪閉脈而伏也急以鹹寒大苦之味大清大瀉之斷不可誤為傷寒太陽始病反見少陰脈沉而用四逆湯溫之溫之則壞事矣又不可誤為傷寒陽厥慎不可下而用四逆散和之和之則病甚矣蓋熱鬱元閉陽氣能交接於四肢故脈沉而澀甚至六脈俱絕此脈厥也手足逆冷甚至通身冰涼此體厥也即仲景所謂陽厥厥淺熱亦淺厥深熱亦深是也下之斷不可遲非見真守定通權達變者不足以語此同又曰凡溫病脈中診洪長滑數者輕重則脈沉甚則閉絕此辨溫病與傷寒脈浮脈沉異治之要訣也同又曰凡溫病脈洪長滑數兼緩者易治兼弦者難治同又曰凡溫病脈沉澀小急四肢厥逆通身如冰者逆同又曰凡溫病脈兩手閉絕或一手閉絕者危同又曰凡瘟病脈沉澀而微狀若屋漏者死同又曰凡瘟病脈浮大而散狀若釜沸者死同舌苔舌冰冷夫舌者胃之外候胃中一有留邪則莫不見於舌苔猶影之隨形桴之應鼓故傷寒與溫疫無一不據舌苔而斷淺深輕重獨此疾不然者邪氣暴烈感之則胃中擾亂奔迸下泄不遑鬱而為舌胎也是以不可以舌苔之有無拘故不必詳論焉然間有見於舌苔者今舉其概略以備採擇耳凡初起有苔者甚稀或有之必白胎而極薄且滋潤須盪滌一日或半日瀉稍減則始變厚白胎是其常候又間有初起生厚白胎者稍緩症也然必滋潤其黃胎者又稀故不可拘無胎不可下並白胎滋潤不可下等之說遲延猶豫則必殺人亦有終始無胎者要之非硝黃不可治焉其瀉多者二三日後舌必變緋薄是瀉多亡津液之所致宜緩緩滋養人參飲子去人參或柴胡清燥湯柴胡養榮湯之類宜之若下症猶在不必拘舌胎嘔渴不止者竹葉石膏湯宜之蓋此疾以尋常傷寒溫疫之法律之則緩者或可及急者不可及是所以為不可拘於舌胎之有無也亦有吐瀉數行舌變冰冷者不可驚誤為虛寒之極用參附之類是陽郁之極也故手足亦多厥冷未必死症是速當峻下厥回則舌亦暖是亦不可不知矣治法凡初起洞泄三四行嘔吐或吐瀉並作或瀉斷而吐猶不止或一二日瀉自止而吐作者此邪在中焦胃中而連於胃口宜大柴胡湯主之間有吐逆不納藥者不可誤為水逆與五苓散之類此症世醫往往用吳茱萸湯小半夏加茯苓湯等者俱非其治所宜前方或加黃連山梔子伏龍肝水煎緩緩冷服之若猶吐不止者本方加辰砂或鐵粉之類或加鐵鏽水煎亦可也若心下硬滿者前方加厚朴或大小承氣湯但痞而不硬者三黃瀉心湯嘔者加辰砂但瀉而不嘔吐者是邪在中焦三承氣湯而兼吐者猶連上焦大柴胡湯加芒硝兼腹痛者涼膈散心中煩悶欲吐不吐者枳實梔子豉湯或更加大黃瀉斷後脈浮而數煩渴引飲者白虎湯或小柴胡合白虎湯吐瀉俱斷嘔渴猶不止者人參飲子去人參或竹葉石膏湯但嘔者本事竹茹湯凡此疾驗盪滌盡未盡有法大便稍稠糞色生小便快利舌苔去則是邪勢盡也否則未盡也未盡則用硝黃徹上徹下不可間斷否則餘燼復熾戒之慎之吐瀉全正舌苔減半猶微微渴者柴胡清燥湯或更加葛根人參飲子去人參半夏加瓜蔞根亦佳舌上緋薄如豬肪者津液虛耗也亦宜前方或柴胡養榮湯婦人室女經水適來者多在吐瀉斷後此為熱入血室宜小柴胡加鮮地黃或犀角亦佳余見各門按醫治此症有知宜清涼猶畏大黃之盪滌者徒從事芩連梔柏之類其輕者適有愈至感之重邪之劇者既無盪滌之能反招閉塞之害邪氣無由而泄津液愈耗是猶葉公之好龍遂不能入其室與彼用參附誤人者不過五十步百步之相距也如何則此疾邪氣一蟠踞於胃中非大黃之盪滌不可拔且大黃之治瘟疫實為必用之藥古今神人之所同然昔耶律楚材下靈武諸將爭掠女子玉帛耶律楚材獨取書數部大黃兩駝而已既而軍中大疫惟得大黃可愈所活幾萬人又陳宜中夢神人語曰天災流行人多死於疫癘唯服大黃得生因遍以示人時果疫因大黃得生者甚多可見大黃之於疫固不可闕之品矣蓋大黃之治疫專為逐邪而用焉本不論大便之利不利胃中有結邪非大黃不能去矧此症之瀉為邪熱而瀉若欲俟其燥結而下之遂無可下之時而病者已斃矣是醫之咎也故巴豆之峻亦有所不畏且夫仲景治傷寒嘔吐而下利者用大柴胡湯亦少陰病下利清水色純青者用大承氣湯自餘下利之症用大黃者在經文歷歷可徵矣今此疾所下非清水則必如敗醬無一下利清穀者故下劑一投輕者即斷重者不至劇者以胃中蟠踞之邪散也是皆大黃之功安患洞泄乎吳又可曰邪傳胃煩渴口燥舌乾胎刺氣噴如火心腹痞滿午後潮熱此應下之症若用大劑芩連梔柏務清熱竟不知熱不罷自成其熱皆由邪在胃家阻礙正氣鬱而不通火亦留止積火成熱但知火與熱不知因邪而為火熱智者必投承氣逐去其邪氣行火泄而熱自已若概用寒涼何異揚湯止沸每見今醫好用黃連解毒湯黃連瀉心湯蓋本素問熱淫所勝治以寒涼以為聖人之言必不我欺況熱病用寒藥最是捷徑又何疑乎每遇熱甚反指大黃能泄而損元氣黃連清熱且不傷元氣更無下泄之患且得病家無有疑慮守此以為良法由是遇熱症大劑與之二三錢不已增至四五錢熱又不已晝夜連進其病轉劇至此技窮力竭及謂事理當然又見有等日久腹皮貼背乃調胃承氣症也況無痞滿益不敢議承氣唯類聚寒涼專務清熱又思寒之最者莫如黃連因而再倍之日近危篤有邪不除耽誤至死猶言黃連至幾兩熱不能清非藥之不到或言不治之症或言病者之數也他日凡遇此症每每如是雖父母妻子不過以此法毒之蓋不知黃連苦而性滯寒而氣燥與大黃均為寒藥大黃走而不守黃連守而不走一燥一潤一通一塞相去甚遠且疫邪首尾以通行為治若用黃連反招閉塞之害邪毒何由以泄病根何由以拔既不知病源焉能愈疾哉溫疫論案吳氏此論實宜為畏大黃之盪滌而徒從事於芩連者之頂門一針矣嘔吐夫邪之入胃上走則嘔吐下迫則泄利上下並走則吐瀉俱起故斯疾吐瀉並作者此常候也間有吐瀉偏者吐瀉多少偏者蓋雖系其人胃氣之厚薄亦因邢之上走與下迫而異也俱宜下奪以挫其上走之勢邪熱一去則吐自止瀉又尋止矣世醫遇如此之症欲強止其吐往往以小半夏加茯苓湯吳茱萸湯或生薑瀉心湯黃芩加半夏生薑湯旋覆代赭石湯之類亦有為水逆與五苓散亦有以半夏藿香丁香縮砂之類投之者雖俱系治嘔吐之藥非治本之法邪之至輕者幸有治焉若邪之劇者藥下咽徒使病者益苦悶耳如此不如與一杯之冷水予治此症大抵以大柴胡湯放冷與之初服雖或吐之二三服之後必止若猶吐不納者加辰砂末少許或鐵粉亦可用或以伏龍肝水煎之或湯成少加鐵鏽水莫不納三黃湯加辰砂亦宜隨症而服之若大邪既去而猶咂吐不止者本事竹茹湯或竹葉石膏湯之類放冷服之又有一症嘔吐之劇一滴藥汁入口則乍吐出甚者聞藥臭亦嘔與冷水則不吐至於此醫家病家往往束手余每遇此症先斷藥湯以新汲水服紫雪大豆許日三五度後竹茹湯竹葉石膏之類隨症與之則不吐此亦不可不知凡此疾嘔吐皆屬熱故與熱藥則必吐而不納其無吐者亦生吐雖吐之劇者與冷水則不吐是其證也故粥漿以至湯藥盡禁熱服必當放冷服之是予所歷試之真訣也張石頑曰凡溫病熱疾嘔吐者火性上炎也無問表裡通用涼膈散嘔吐煩渴者白虎湯張氏醫通又曰溫病熱病時疫乾嘔煩悶者黃連解毒湯同楊慄山曰溫病嘔吐者胃中伏火鬱而攻發也增損三黃石膏湯加味涼膈散加石膏清利之自止寒溫條辨又曰凡胃熱甚服藥嘔吐不納者愈吐愈服三服後火性漸消然後徐徐用藥即不吐同渴凡熱邪犯胃則渴渴之極必引冷水此疾邪火先入胃故多渴但有好冷有好熱俱為熱症其或好熱誤認為寒與參附熱藥則轉輕為重不可不謹若欲冷水者少少與之不妨其他梨漿西瓜之類病人慾之宜與之至治法若吐瀉不止而渴者三黃加石膏湯或大柴胡湯加石膏吐瀉止而渴不止者小白湯大湯引飲者白虎湯邪大半解而嘔渴不止者竹葉石膏湯並宜生於津液之品葛根栝樓根麥門冬之類於對症方中加之亦佳矣予治此症不論渴之冷熱一切湯藥至白湯粥清盡放冷與之不然則助嘔而納間有不嘔者必益瀉或為腹痛是最治此疾之緊關故不厭煩而屢告焉吳有性曰如大渴思飲冰水及冷飲無論四時皆可量與蓋內熱之極得冷飲相救甚宜能飲一升止與半升寧使少傾再飲至於梨汁藕汁蔗漿西瓜皆可備不時之需如不欲飲冷當易白滾湯與之乃至不思飲則知胃和矣溫疫論楊慄山曰溫病本未身冷不渴小便不赤脈不洪數者未之有也輕則白虎湯加白姜蠶蟬蛻天花粉重則增損三黃石膏湯加大黃凡病忽欲飲水者為欲愈蓋腸胃燥則不能散邪得水則和其胃氣汗出而解若不與水則乾燥無由作汗遂至悶亂也寒溫條辨案此說甚妙瀉疫渴飲水數升始有蒸然為汗者焉厥冷夫厥冷者陰寒之極故諸病見之者咸為陽氣衰絕之候但傷寒與瘟疫純熱之極而亦見之謂之陽厥古法率以盪滌為主矣今此疾亦瘟疫之一種純熱之邪也故往往見厥冷之症而查其所從來凡有三其一吐瀉數行不及服藥而厥冷脈伏是尤劇症其一邪勢原輕醫者與緩劑藥方不與病敵半日或一日後邪熱稍劇遂至於厥冷脈伏是其次也其一服參附之類或阿片等或大艾焚灼使邪炎鬱塞遂至厥冷脈伏者是也三症中不及服藥而厥冷者雖邪勢劇畢竟不過內結壅閉陽氣逆於內不能達於四末故與大柴胡湯大承氣湯之類邪炎一衰陽氣一通則厥愈脈出甚者走馬湯備急丸杏仁丸硃砂丸之類亦可選用其服緩劑邪勢加劇而厥冷者比前症稍難然猶有可救者治法同上法如其參附炙炳阿片等之誤治助長之弊邪勢加劇必耗正氣或動宿疾其變至不可測有發膈痛者有轉筋者有吐瀉俱斷而膈熱如燒煩躁不安者有瀉斷而吐益劇者有吐下蛔蟲者種種不一至厥之甚通身冰冷肌膚血凝青紫成斑唇口指甲並四掌變青紫直視上插舌冷如冰煩渴欲冷水與水則納與熱則吐神雖昏不近衣服是梟猛之邪內郁而陽氣不能四布之候俱系醫之失治而猶不察卒至於此又況燒酒熨之芥子泥塗之助桀為暴之徒乎實可痛憫矣當此時非斬關奪旗之兵恐不能得救拔治法亦宜前數方其他涼膈散白虎湯竹葉石膏湯六一順氣湯解毒承氣湯之類隨其症而選用之或可回死於無何有之鄉矣李挺曰熱極忽然伏於內故身寒四肢厥逆狀若陰症但身雖冷而不欲近衣神雖昏而氣色光潤脈沉滑而有力此陽極似陰也宜大柴胡湯下之或白虎湯竹葉石膏湯醫學入門吳綬曰厥應下而不可發汗汗之則口傷爛赤也傷寒蘊要又曰陽厥者必先因熱甚不解而後發厥也經言厥深熱亦深厥微熱亦微此之謂也切其脈雖沉按之則滑四肢雖冷手足心或溫也或時煩躁畏熱喜冷與之冷水則咽也此乃陽厥之候同張石頑曰溫病熱病時疫熱極而厥者涼膈合解毒或合承氣下之熱不退者再下之張氏醫通又曰手足厥逆少氣唇面爪甲背青六脈俱伏而嘔出酸穢瀉下臭惡便溺黃赤者此火伏於厥陰也為熱極似陰之候急作地漿煎竹葉石膏湯誤作寒治必死同吳有性曰凡陽厥手足皆冷或冷過肘膝甚至手足指甲皆青黑劇則遍身冷冰如石血凝青紫成片或六脈無力或脈欲絕以上脈症悉見純陰猶以為陽症何也蓋審內症氣噴如火齦爛口臭煩渴譫語口燥舌乾舌胎黃黑或生芒刺心腹痞滿小腹疼痛小便赤澀涓滴作痛非大便燥結即大腸膠閉非協熱下利即熱結旁流以上內三焦悉見陽證所以為陽厥也粗工不察內多下症但見里症脈體純陰誤投溫補劑禍不旋踵溫疫論又曰凡陽症似陰者外寒而內必熱故小便血赤凡陰症似陽者格陽之症也上熱下寒故小便清白但以小便赤白為據以此推之萬不失一同楊慄山曰大抵陽症似陰乃假陰也實則內熱而外寒在傷寒以大承氣湯下之有潮熱者六一順氣湯熱甚合黃連解毒湯在溫病雙解涼膈加味六一解毒承氣之類斟酌輕重消息治之以助其陰而清其火使內熱既徐則外寒自伏易所謂水流濕者即此義也此與陽勝格陰例同王太僕所謂病人身寒厥冷其脈滑數按之鼓指者非寒也余謂火閉而伏多見脈沉欲絕不盡滑數鼓指也要在詳症辨之寒溫條辨又曰溫病厥逆無陰厥雜氣伏郁陽熱內迫格陰於處氣閉不能達於四肢甚有通身冰冷其脈多沉滑或沉伏或沉細欲絕或六脈俱閉所云體厥脈厥是也症多怪異不測之狀輕則升降散增損雙解散加味涼膈散重則加味六一順氣湯解毒承氣湯斟酌下之豈可與傷寒陽厥並論哉若數下後厥不回熱不退者死亦有利下數十行厥方回熱方退而得生者正所云急症急攻下之或可活不下必死無疑矣此則溫病厥逆治法也同唇甲青紫凡邪熱梟猛之症不速盪滌則必致手足厥冷厥冷之極必至唇口青紫此蓋鬱熱熾盛血脈凝滯之所致亦有輕症用熱劑鼓激邪火而至於此者不知者往往誤認為陰寒之症益用溫熱之劑愈用而愈甚豈知青中有紫原非陰寒之症哉盪滌少遲則必就鬼錄矣治法詳於厥冷門中其辨色之法張石頑論之最詳宜參看焉張石頑曰色之青者為寒赤者為熱以寒中於里則血脈凝滯不能榮行於外所以唇爪青黑也若熱毒流入於裡而為熱厥則唇甲亦青中必滯深紫與陰寒之青黑不同試觀產婦以舌青驗子死唇青驗母死則知青黑為陽氣竭絕不得與青紫渾稱也張氏醫通轉筋轉筋之一症多在誤藥致厥者間有不經誤治吐瀉數行忽轉筋者俱是津液耗渴邪火迫於筋脈之所致亦有腰腿間肌肉降起作痛者是亦邪鬱血凝之所致俱宜大柴胡湯大承氣湯之類或加行血之藥一二味最佳罨法刺絡之類亦輔治之一策隨症或宜用之蓋此症去秋尤多今秋甚稀豈邪氣稍與人身諳而然歟龔西園曰轉筋屬熱血四物湯加酒芩紅花蒼朮南星煎服醫學源流肯綮大成按此等法宜大邪既去而轉筋猶不止者若其邪炎猶熾而轉筋者恐非此等之法所能治學者思焉又委中穴也血或十指頭出血皆是良法然刺絡之法宜未至厥冷者若厥冷之極轉筋者用之則只出紫黑血點數滴耳遂不能救故行之當在早矣目眩直視目反露睛夫目五臟精華之所聚故五臟方有病其候往往見於目況此症熱毒之極一感之則或上攻頭目或下迫腸胃者乎故初起有目眩者或目系急痛卒倒而不省人事者俱為邪熱元閉上攻頭目之所致宜走馬湯備急丸大承氣之類若其手足厥冷必直視目反不可驚為死症也厥回則復常治法詳於厥冷門亦有手足厥冷而目半開半合睡中露睛者輕者厥回後三五日猶不止不可誤為中氣虛極而與溫補之藥必致不救仍宜確守前法邪退精氣復則止矣楊慄山曰溫病頭目眩及頭脹頭痛汗並目赤目黃目不明目直視目反折與傷寒治法不同俱系雜氣伏郁中焦邪熱元閉上攻頭目乃胃家實也通宜升降散加味涼膈散清利之頭眩疼量加大黃目眩赤等症量加龍膽草酒炒寒溫條辨呃逆呃逆之症熱邪鬱於胃之所致也故用熱藥而致其冷者多發之不可誤為胃寒與丁香附子等之熱劑不獨呃逆不止必致諸症增劇但宜大柴胡湯三承氣湯之類下之則自止下症既去渴而呃逆者宜白虎湯若其初起用盪滌法吐瀉全止而呃逆者餘熱猶伏於胃中也宜竹葉石膏湯橘皮竹茹湯本事竹茹湯之類若邪全去而猶呃逆數日不止者屬胃寒宜丁香柿蒂湯之類然屬寒者誠百中之一二也宜詳內外果屬寒則用前法病源論曰伏熱在胃令人胸滿氣逆氣逆則噦程國彭曰當下失下胃火上衝而呃者其症燥渴內熱大便閉結大柴胡湯下之醫學心悟吳有性曰胃氣逆則為呃逆吳中稱為冷呃以冷為名遂指為胃寒不知寒熱皆令呃逆且不以本症相參專執俗語為寒遂投丁茱薑桂誤人不少吾願執辭害義者臨症猛省溫疫論又曰治法各從其本症而消息之如見白虎症則投白虎見承氣症則投承氣膈間痰閉則宜導痰如果胃寒丁香柿蒂散宜之然不若四逆湯功效殊捷要之但治本症呃自止其他可以類推矣同發斑凡發斑為熱邪外解之候故此疾發斑多在用下藥吐瀉已斷之後二三日又有初時誤服熱劑迫陰血裡氣壅閉不得外泄至成厥冷忽峻下一投裡氣忽通邪熱外泄而發斑者又初時雖服熱劑邪氣固微不到激昂正氣一旺又發斑者俱與溫疫發斑治法一同今舉吳楊二氏之說宜參看焉又有先發斑而一二日後吐瀉始發者此屬一種之變局治法俱同前矣吳有性曰邪留血分裡氣壅閉非下不能發斑斑出發毒邪外解下後斑漸出更不可大下設有下症少與承氣湯緩緩下之若復大下中氣不振斑毒內陷則危宜托裡舉斑湯溫疫論楊慄山曰夫疹與斑等乃溫病中之重症也治同溫病傷寒百不出一總緣雜氣之毒鬱於胃中無所施泄發於皮膚而為疹增損雙解散主之加紫背浮萍五七錢或重加石膏大黃芒硝清散得宜未有不出者如身出而頭面不出此毒氣內歸危候也急以大蟾蜍一個搗和新汲水去渣痛飲之自出屢驗寒溫條辨結胸傷寒結胸多在用下劑甚早邪氣陷入此癥結胸多系鬱熱上炎與水飲相結故素常蓄飲人患之最多輕者小陷胸湯加大黃或大茈胡合小陷胸湯或更加芒硝千金陷胸湯亦可用甚者大陷胸湯大承氣湯加甘遂在上者宜吐之三物白散之類量症之輕重而選用之旁用罨法亦可矣亦有初起用熱劑下利忽止邪熱無出路於是郁邪上攻迫於心膈以為結胸者治法俱同於上其兼發斑或呃逆脈沉微手足厥冷等在傷寒為難治此疾未必然楊慄山曰溫病鬱熱內攻火性上炎一發即心胸結痞脈洪滑數或伏沉自是熱實結胸痞氣特患下之不早耳非大小陷胸或陷胸承氣加味涼膈等方下之腹痛此疾兼腹痛者甚稀但夏至前後邪勢尚嫩秋秒後邪勢已老之時患之者必兼腹痛又者兼蛔蟲挾滯食動疝瘕者六七月盛行之時感之者必無腹痛又初起無吐瀉但腹痛如刺頗類攪腸痧者有之邪勢尤劇非走馬湯備急丸杏仁丸之類則不能治之少少腹痛不必拘但宜大柴胡湯涼膈散三承氣湯之類宜量其輕重而與之若果繫於兼蛔兼滯食則於對症藥中加殺蟲消導之一二味亦可矣若其邪全去而痛猶綿綿不止者多是動宿疾也宜詳其因而治之蛔蟲平素多蛔之人一感此疾蛔不堪其溫熱煩擾動痛或從口出或從肛門出亦有無痛而忽然吐出者此皆因邪火犯胃蛔不安其居已故以逐邪火為要不必治蛔若誤為胃寒與溫熱之劑則邢勢愈加至不可救但硝黃盪滌邪炎自熄則蛔亦安居若不得已而治之則宜兼服清中安蛔湯其吐蛔愈多而時時腹痛不能飲食者是胃敗也多屬不治吳有性曰疫邪傳裡胃熱如沸蛔動不安下既不通必反於上蛔因嘔出此常事也但治其胃蛔厥自愈每見醫家妄引經論以藏寒蛔上入膈其人當吐蛔又云胃中冷必吐蛔之句便用烏梅丸或理中安蛔湯方中乃細辛附子乾薑桂枝川椒皆辛熱之品投之如火上添油殊知疫症表裡上下皆熱始終從無寒症者不思現前事理徒記紙上文辭以為依經傍注坦然用之無疑因大誤人甚眾溫疫論馬印麟曰蛔厥有熱渴者黃連解毒湯有下症者承氣湯溫疫類編口中糜爛吐瀉已止飲食稍進後二三日或四五日忽然口舌糜爛者間有焉余炎薰蒸之所致也宜涼膈散兼點柳花散或以黃連解毒湯之類嗽之亦可矣清胃散瀉火湯之類亦宜服用解後大小便不利邪結不散則陽氣內結小便不利甚者二三日不通者有之是此疾之常事服硝黃之類邪火一消大便生渣滓則通不必強利小便不知者利其小便此大誤也亦有下利斷後小便猶不快利者此下後津亡之所為勿以豬澤之屬利之飲食進津液生則自通矣吐瀉後大便數日不行者此亦常事別無他證不可攻之吐下後津涸陽亡胃中虛燥所致也飲食日加津液自通則大便出矣若病人覺脹悶則宜調胃承氣養胃承氣麻子仁丸之類痧復凡此疾初起用下劑而吐利止飲食漸進氣力全復近者半日或四五日遠者十日或半月餘已而忽然前症再發疲睏十倍於前日比比有焉是蓋非再感乃余炎未歇再縱其梟惡也其故何也前日退消黃甚早余炎不全去其他或輕症服溫劑而愈或緩藥治之幸而愈以邪勢之不劇雖一旦得效余炎再集則前日不用盪滌之咎也勿以其氣力未復與補藥以養其梟宜速與硝黃之類以拔其邪藪縱藥緊於前日勿緩於前日倘誤為胃虛投參附薑桂蓍術之類則禍不旋踵再感亦同焉劉松峰曰凡治傷寒溫疫醫者最重初次得疾至於痧腹謂死者蓋寡每視為至輕而謾不經意焉蓋謂痧復之病人身之經絡藏府皆前次溫邪所曾經傳遍之所則此番不過由熟路而行故邪氣易出也右人原有此論豈知此第語其常也獨瘟疫盛行之時則不然蓋是時疫氣所積者厚即無氣食勞損之因尚有重感厲氣而復者更有前疇餘邪稍有未淨再醞釀滋蔓而猝然自復者是天氣之邪與人之氣血膠固充塞鬱勃糾紛故復至三四次尚有損命者矣慎毋以其復也而忽之松峰說疫妊娠妊娠感此疾服藥尤不可遲緩宜速投盪滌之劑慎勿惑硝黃墮胎之說以用補藥或緩劑如此則邪火愈熾熱毒迫子宮胎必墮若早與下劑以清肅之則火毒消滅元氣泰然復何墮胎之有也古人所謂有故無損者是也亦間服藥數日吐瀉已竭飲食稍進忽然再復者因憶受胎則腹中與平人自異邪熱必伏匿固結於子宮間豈一下之所能了乎是以余炎再聚則再呈梟惡亦不可知也後學者宜詳焉吳又可曰孕婦時設疫應用三承氣湯須隨症施治慎勿惑於參朮安胎之說病家見用承氣先自驚疑或更左右嘈雜必致醫家掣肘為子母大不詳若應下之症反用補劑邪火壅鬱熱毒愈熾胎愈不安耗氣搏血胞胎何賴是以古人有懸鐘之喻粱腐而鍾未有不落者唯用承氣逐去其邪火毒消散炎熇頓為清涼氣回而胎自固當此證候反見大黃為安胎之聖藥歷當子母俱安若腹痛如錐腰痛如折此將墮胎欲墮之候腹藥亦無及矣雖投承氣但可愈疾而全母昧者以為墮胎必反咎於醫也溫疫論又曰或詰余曰孕婦而投承氣設邪未逐先損其胎當如之何余曰結糞瘀熱腸胃間事也胎附於脊腸胃之外子宮內事也藥先到胃瘀熱才通胎氣便得舒養是以興利除害於傾刻之間何慮之有但投藥之際病衰七八餘邪自愈慎勿過劑耳同楊慄山曰妊娠溫病內蘊邪熱里證居多不可發汗急用護胎之法井底泥塗臍至闕元干再易之或以青黛伏龍肝為末水調塗之若大黃乾嘔錯語呻吟增損三黃石膏湯清化湯若熱甚燥急胎動不安必須下之慎勿惑於參朮安胎之說奪其裡熱庶免胎墮蓋邪火壅鬱胎自不安轉氣傳血胎胞何賴酌用升降散雙解散加味涼膈散或去芒硝以逐去其邪則焰熇頓為清涼氣回而胎自固寒溫條辨發狂予去秋見一壯婦患瀉疫吐瀉數行煩渴引冷水醫者與參附之劑證益加劇於是替醫後醫亦復與參附數劑吐利益甚遂發狂而死余意此證邪勢梟猛如經參附熱劑故鼓動邪勢迫於陰血而發狂爾也若初與承氣諸湯則必不至於此然既至於此亦仍用承氣諸湯或可收功也果繫於蓄血則桃核承氣湯或大承氣湯加桃仁紅花當歸抵當湯丸之類尚或可救焉而此之不顧飽用參附而令狂死實可痛悼矣吳有可曰有喜笑如狂者此胃熱波及於血分血乃心之屬血中留火延蔓心家宜其有是證矣仍從胃治溫疫論楊慄山曰傷寒瘟病雖根源不同至於發狂皆邪熱之極使非峻逐火邪則不能已故但察其大便硬結或腹滿而堅或濕滯膠閉或協熱下利或熱結旁流有可攻之證酌用大小承氣涼膈六一解毒承氣之類下之如無脹滿結實等症而惟胃火使然者但以白虎解毒三黃石膏大小清涼之屬清其火邪其病自愈寒溫條辨下血下血之症亦往往在初發是皆用熱藥迫於血分之所致也不必具小腹硬滿急脹小便自利等之候間有喜忘如狂者亦有昏聵不清楚者若大便中有血色者熱犯血分無疑桃核承氣湯抵當湯之類亦可用之又有初起小便出血者是熱犯小腸之所為今秋治小兒患之者一人而已不多見詳見於治驗中吳有可曰胃實失下至夜發熱留血分更加失下必致瘀血初則晝夜發熱日晡益甚既投承氣晝日熱減至夜獨熱者瘀血未行也宜桃仁承氣湯服湯後熱除為愈或熱時前後縮短再服再短畜血盡而熱亦盡大勢已去亡血過多余焰尚存者宜犀角地黃湯調之溫疫論又曰胃移熱於下焦氣分小便不利熱結膀胱也移熱於下焦血分膀胱畜血也又曰小便不利亦有畜血者非小便自利便為畜血同變證卒然惡寒振慄肌膚粟起半時或一時許而吐瀉並作者或吐瀉一二行而振慄者是邪遊溢太陽經也從吳氏之法與達原飲加羌活輕者自解重者非下劑不愈又有無惡寒振慄但頭痛如破脈弦數而吐瀉者前方加葛根或大柴胡加葛根又有憎寒而下血者小便出血者是邪逼下焦之症宜桃核承氣湯或承氣湯加桃仁紅花當歸之類尿血者外臺崔氏療卒傷熱尿血方或當歸承氣湯溫疫論桃仁湯宜之吐血者聖惠茜根散三黃瀉心湯聖惠苦參湯宜之又有卒然頭眩昏倒舉體麻痹續轉筋而不吐瀉者或手足厥冷脈伏是陽氣鬱遏不伸之候宜走馬湯備急丸亦有宜白虎湯者此他變證猶多不必一一具論焉聊舉其一二耳臨機通變自存於其人死症洞泄一日或二三日後毒臭沖鼻傳旁人衣服而不消者並厥回脈出而大便遺失不覺猶發揭衣被煩渴欲飲水者水瀉一二行起居未衰乍聲啞者水瀉止後大便滑通無度者或發狂不省人事者又劇症服藥得厥回脈出吐瀉全斷飲食稍進而吐蛔不止者予去秋來治此疾數百人其如此者僅不過五六人而二三日後必死終不能救也噫是實屬死症不可挽回歟抑猶有一線生路而余術未至末由救拔歟後之值此等症者研精殫思有能發明補余罅漏死而瞑目矣又如老人虛人雖原匪死症並弗誤治榮衛衰弱或宿疾發動有不可枝梧者然十人中不過一二人耳此所謂天覆傾者非醫人之罪也禁忌人參附子罌粟殼胡椒阿片訶子燒石熨藥燒酒清酒鹽熨炙蕃椒肉豆蔻熱湯熱弱以上諸品正須禁絕之但巴豆極熱之性而不在禁中者如備急丸走馬湯紫丸白散杏仁丸之類足以助硝黃之所不及其他一切湯藥飲食宜冷而不宜熱否則嘔吐不納受預防凡正邪不兩立正氣實則邪無由入故欲預防感觸宜先禁飽食大醉一切油膩並堅硬難化之物常粗食勞筋骨勿過時時炙背腹勿有間斷勿不時飲食勿數入房勿冒雨露勿深夜行道路入山林如此則筋脈舒暢精氣充實邪氣何由入焉此為預防第一之策古人有闢溫等之方予未之信倘病家強乞藥不得已而與之平胃散六君子之類蓋脾為諸陽之本脾胃健則津液四布氣血充盛庶幾無邪氣乘虛而入劉松峰曰溫疫乃天地之邪氣人身正氣固神氣守則邪不能幹故避之在節欲節勞仍毋忍飢以受其氣至於卻邪之法如經所云天牝從來復得其往氣出於腦即不幹邪是也蓋天牝者鼻也鼻受天之氣故曰天牝溫邪之氣自空虛來亦欲其由空虛而去即下句氣出於腦之謂也蓋邪氣自鼻通腦則流布諸經令人病溫氣出於腦謂嚏之或張鼻以泄之或受氣於空速泄於外而大吸清氣以易之則卻從鼻出而毒氣自散祛邪於外之外也又如想心如日等法蓋膽屬少陽中正之官其氣壯則藏氣賴以俱壯而不能入此強中御外之法也凡探病疹疾知此諸法雖入穢地可保無虞男病邪氣出於口女病邪氣出於前陰其對坐之間須知其向背行動從容察位而入方妙說疫或問瀉疫新論稿成有人問曰子以此疾為瘟疫之一種而無一屬虛寒者既得聞命雖然人有老少強弱病有寒熱虛實今如子說不論老少強弱一切與清熱滌穢之劑以為至當之治強壯者幸可保無虞至老幼羸弱者恐有為子死非命者夫人疾病因其人稟賦強弱寒熱虛實異其症故仲景撰傷寒雜病論舉三陽三陰以示寒熱虛實之法而今子不據其法果何所本豈為世服參附而斃者多無非懲羹吹齏之類乎恐招刻舟求劍守株待兔之譏矣曰如子則誠知其常不知其變者也何則人有老少強弱病有寒熱虛實軒岐長沙之所以諄諄教於人而固不待子曰而知也特至於溫疫之邪有不然者是聖所未明言而後世吳又可以降所發明也既知瘟疫之盡屬陽症而陰症百中之一則奚獨怪斯疾之陽症而無陰症乎何則此疾亦瘟疫之一種也且予聞此疾之起在印度夫印度之地在赤道切近極熱之地元陽之氣發而為此純熱梟猛之邪以傳染於四方一觸之則從鼻口入直客於胃中傳血脈上下奔突卻一身之津液上吐下泄故無老少強弱之別一受其邪則胃中如熱釜只恐清解逐穢之力不足矣譬之如火之燒屋屋有大廈小屋然救火非水則不能也抑如子說大廈用水小屋用湯乎必無此理也今此邪之容於人身亦猶火之燒屋要在滅之耳奚暇論老少強弱乎火滅則屋存邪去則人全又不知乎人服巴豆則暴瀉如注是以烈熱之毒入胃中忽卒不和故也若欲止其瀉者令之飲冷水即腹中快和瀉頓止是皆世人所知非可怪而救之何量老少與強弱而為與水哉凡熱邪猛烈直侵腸胃則發瀉利此理甚明白且古人不言乎有故無損當此硝黃雖劇亦何恐之有若顧慮老壯強弱而逡巡失治則噬臍不可及何則邪勢急於燒眉也世有知此疾之不宜溫劑而猶恐硝黃之盪滌者徒事芩連梔柏之類徒養疴斃人者猶欲防勁敵而不遣勁兵委之文吏豈唯其不濟事一敗塗地也明矣子疑未冰釋則諸具舉其非虛寒之徵矣夫此疾卒然洞泄一二行飲食起居無變虛寒者能如此乎此非寒一也其所下之糞色純白如淅米汁或如敗醬毫無色亦完穀下出也肛門熱癢如溫湯瀉出小便赤濁短少虛寒而有如此症乎是非寒二也煩渴欲飲冷水舌上白胎甚者舌強不語虛寒而有如此症乎是非寒三也雖手足冰冷膈熱如燒或無熱猶發揭衣被虛寒有如此者乎是非寒四也與熱藥則吐而不納下利益甚轉加煩悶與涼藥若冷水則不吐是等皆虛寒之所無而熱證獨有之是非寒五也子猶以為不然耶曰非散悉以為非也然世有治此疾專投參附薑桂之徒乃未悉殺人往往有為之救脫者則不能無疑於子之言也曰是何足深怪彼服參附而得生世固有焉如此之症其人正氣素勝所受之邪亦輕不藥自愈之症耳其實非為藥愈也何則邪氣輕正氣勝假令服熱藥一時鼓動邪勢至手足厥冷正氣遂奮然而起也正邪不兩立正氣一勝則邪氣去必然之理也不啻服參附而得生至一等輕症雖服阿片固澀之劑亦愈與發表藥亦愈與芩連亦愈實非藥之效也世更有吐瀉數行至手足厥冷而不服一貼之藥而愈者如若而人天資強堅壯實一則雖誤治不為藥見害一則疾不付醫得中醫之類已子乃思欲以一救萬以溫熱之劑試人性命不亦謬戾之甚乎哉苟非強堅壯實之人則死不旋踵雖或幸愈荏苒引日或明年再發有變為休息痢者有為滯下者余去秋以來目擊如斯之輩凡數十人不啻也以是觀之與溫熱之劑而愈者非藥也乃自愈也客首肯而去明治十三年重陽前三日高島久也祐啟謹補訂

body:
  text: 卷下藥法藥方凡卷中諸方宜冷服不宜溫服若犯之則益吐益下或發腹痛當戒焉今舉於此不復一一注各方下大柴胡湯傷寒論嘔不止心下急鬱郁微煩心下痞硬嘔吐而下利者茈胡半斤黃芩三兩芍藥三兩半夏半斤洗大黃二兩生薑五兩切枳實四枚大棗十二枚擘上八味以水一斗二升煮取六升去滓再煎溫服一升日三服案此方吐瀉並作者並吐多瀉少者宜之吐而不納藥者以伏龍肝水煮之或加辰砂少許更妙大茈胡加芒硝湯會解胸脅滿而嘔日晡所發潮熱已而微利即前方中加芒硝案此方前方症而下利數行不止者宜之大茈胡湯加黃連山梔子同前證嘔吐心煩者宜之六一順氣湯寒溫條辨少陰厥陰病口燥咽乾煩熱消渴譫語神昏大便燥實胸腹滿硬或熱結旁流繞臍疼痛厥逆脈沉伏者主之大黃四錢芒硝二錢五分厚朴錢半枳實一錢柴胡一錢黃芩白芍甘草生各一錢水煎去渣入鐵鏽水三匙冷服加薑蠶三錢蟬退十個黃連一錢名加味六一順氣湯溫病主方治同前證竹葉湯千金治小兒夏月患腹中伏熱溫壯來往或患下利色或白或黃三焦不利方竹葉小麥柴胡麥門人參甘草茯苓黃芩上八味㕮咀以水四升煮竹葉小麥取三升去竹葉小麥下諸藥煮取一升半分三服若小兒夏月忽壯熱燒人手洞下黃溏氣力惙然脈極洪數用此方加大黃二兩再服得下即瘥案此方下利而無嘔吐者去人參加大黃用之若嘔者更加半夏瀉心湯心下痞按之濡者大黃一兩黃連黃芩各一兩上三味以水三升煮取一升頓服之案此方心煩嘔吐而下利心下痞者宜之嘔甚者加辰砂更妙大承氣湯自利清水色純青心下必痛口乾燥者急下之陽明少陽合病必下利三部脈平按之心下硬者急下之下利脈遲而滑者內實也利未欲止當下之下利脈反滑當有所去下之乃愈下利差後至其年月日復發者以病不盡故也當下之大黃四兩厚朴半斤枳實五枚芒硝三合上四味以水一斗先煮厚朴枳實取五升去滓內大黃煮取二升去滓內硝更上火一兩沸分溫再服案此方無嘔吐而瀉不止或日數十行者最宜此方調胃承氣湯自下利者脈當微厥今反和者知為內也心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先其時自極吐下者大黃甘草芒硝上三味以水三升先煮大黃甘草取一升去滓內芒硝更上火微煮令沸少少溫服之案此方下利久不止虛羸頗甚腹皮貼背無痞滿等證者或瀉止後經數日飲邪再聚發前症但疲困殊甚者宜此方或加當歸芍藥也醫每遇此等症見其疲困恐大黃損元氣疑慮失錯往往與參附之劑誤人者多不可不戒矣解毒承氣湯寒溫條辨瘟病三焦大熱痞滿燥實譫語狂亂不識人熱結旁流循衣摸床舌卷囊縮及瓜瓤疙瘩瘟上為癰膿下血如豚肝等症厥逆脈沉伏者此方主之白薑蠶三錢蟬退全十個黃連一錢黃芩一錢黃柏一錢梔子一錢枳實二錢五分厚朴五錢大黃五錢芒硝三錢別入甚至痞滿燥實堅結非常大黃加至兩餘芒硝加至五七錢治動嘔者又當知之加栝蔞一個半夏二錢名陷胸承氣湯治胸滿兼有上症者案此方熱鬱胸膈作胸滿胸痛等種種症者隨後加味用之頗有效涼膈散張氏醫通煩擾腹痛脈來數疾大黃朴硝甘草各二十兩山梔子薄荷黃芩各十兩連翹上為末水一盞入竹葉七片蜜少許煎服加味涼膈散寒溫條辨溫病主方楊栗山曰余治溫病雙解涼膈愈者不計其數若病大頭瓜瓤等瘟危在旦夕數年來以二方救活者屈指以算百十餘人真神方也其共珍之即於涼膈散方中加白薑蠶三錢蟬退二錢薑黃七分黃連二錢胸中熱加麥門冬心下痞加枳實嘔渴加石膏小便赤數加滑石滿加枳實厚朴案以上二方煩躁多渴兼胸腹痛者並手足厥冷心膈有熱者俱宜選用梔子豉湯傷寒論發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出下利後更煩按之心下濡者為虛煩也梔子十四個擘香豉四合綿裹上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服案此方吐下止後余炎犯膈心煩不得眠懊憹苦悶者宜之若腹滿者加厚朴枳實若心下堅者加枳實大黃白虎湯傷寒論手足逆冷若自汗出脈滑而厥者里有熱知母六兩石膏一斤碎綿裹甘草炙二兩粳米六合上四味以水一升煮米熟湯成去滓溫服一升日三服按此方吐瀉止後四肢厥冷嘔渴引飲者或不厥但渴欲飲水者並宜此方竹葉石膏湯同虛羸少氣逆欲吐者竹葉二把石膏一斤半夏半斤洗麥門一升人參二兩甘草二兩炙粳米半升上七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服案此方瀉止後余炎犯胃嘔渴不止或厄逆者宜此方方中人參宜更竹節小白湯赤水醫案治挾熱下利六脈洪大口唇乾燥小柴胡湯合白虎湯案此方前症而猶有柴胡證者宜之若心煩者加黃連人參飲子聖惠治陽毒傷寒四肢壯熱心煩嘔吐不止小柴胡湯去大棗加麥門冬竹葉案此方邪猶盛嘔渴不止者宜之方中人參宜去之蘊要心煩者更加黃連小柴胡合黃連解毒湯正傳治少陽陽明合病脅痛嘔逆自利脈弦長而沉實案此方前症而膈熱猶盛者宜之本事竹茹湯治胃熱嘔吐葛根三兩甘草半夏各三分上薑三片竹茹一彈丸棗一個水煎案此方火邪既去嘔吐不止者宜之柴胡清燥湯溫疫論下後間服緩劑柴胡黃芩知母陳皮甘草花粉上薑棗水煎九味清脾湯濟生治疸瘧但熱不寒或熱多寒少青皮厚朴白朮草果甘草柴胡茯苓半夏黃芩各等分上薑水煎建原飲溫疫論治溫疫初起憎寒發熱其脈不浮不沉頭疼身痛邪在挾脊之前腸胃之後者檳榔二錢厚朴知母芍藥黃芩各一錢草果甘草各五分上水煎邪熱溢於少陽經加柴胡一錢溢於陽明經加葛根一錢又加大黃葛根羌活薑棗水煎名三消飲治毒邪表裡分傳案以上三方吐利止後隨症而選用之但達原飲一方初起無吐瀉憎寒發熱或頭痛者隨後加減方用之竹茹溫膽湯壽世治傷寒日數過多其證不退夢寐不寧心驚恍惚煩躁多痰竹茹半夏枳實陳皮人參生薑甘草茯苓香附柴胡麥門桔梗黃連上薑棗水煎案此方吐利止火邪既去而余炎猶不盡荏苒引日或煩躁多痰者宜之柴胡養榮湯溫疫論表有餘熱血燥者柴胡黃芩陳皮甘草當歸白芍生地知母天花粉上薑棗水煎案此方吐瀉數日後津液虛耗羸瘦疲困舌上緋薄如豬肪者或大病後並亡血家老人患此症津液虛耗者下後調理宜此方杏蘇散易簡治四時溫疫傷寒香附子紫蘇葉各四兩陳橘皮二兩甘草一兩上水煎管見加川芎白芷薑棗水煎名芎芷香蘇散案此方瀉疫輕症吐瀉既斷無餘症但氣宇不了了者加荊芥薄荷或更加防風亦佳小柴胡加地黃湯本事治婦女室女傷寒發熱或發寒熱經水適來或適斷晝則明瞭夜則譫語如見鬼狀亦治産後惡露方來忽爾斷絶小柴胡湯加生地黃案此方婦女患此疾經水適來或適斷者宜之下利未止者加大黃小承氣湯傷寒論大便不通噦數譫語下利譫語者有燥屎也大黃四兩厚朴二兩炙去皮枳實二枚大者炙上三味以水四升煮取一升二合去滓分溫二服黃連解毒湯回春治傷寒熱症醫者誤用薑桂等藥助起火邪痰火相搏而嘔逆黃連三兩黃芩黃柏各二兩梔子十四枚上水煎白虎湯同治症同前方見前桃仁承氣湯準繩治實熱發厄桃仁五十個去皮尖大黃四兩桂枝二兩去皮甘草二兩炙芒硝二兩上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合調胃承氣湯同治症同前方見前三黃瀉心湯同治症同前方見前小陷胸湯回春治傷寒發渴而飲水太過或結胸而發嘔者黃連一兩半夏半升洗栝蔞實大者一枚上三味以水六升先煮栝蔞實取三升去滓內諸藥煮取二升去滓分溫三服以上七方隨症選用之升麻葛根湯局方治大人小兒時氣溫疫頭痛發熱肢體煩疼瘡疢已發及疑似升麻葛根芍藥甘草上水煎或加犀角玄參更妙敗毒散同治傷寒時氣及寒壅咳嗽鼻塞聲重人參茯苓甘草前胡川芎羌活獨活桔梗柴胡枳殼各三十兩上生薑薄荷水煎或加黃芩石膏方中人參今去之陽毒升麻湯活人治傷寒陽毒面赤斑斑如錦紋咽喉痛下膿血升麻二分犀角屑射干黃芩人參甘草各一分上水煎準繩加玄參名犀角玄參湯治發斑毒盛今去人參加玄參玄參升麻湯同治傷寒發汗吐下後毒氣不散表虛里實熱發於外故身斑如錦紋甚則煩躁譫語兼治閉腫痛玄參升麻甘草各半兩上水煎托裡舉斑湯溫疫論中氣不振斑毒內陷者當歸芍藥升麻白芷柴胡川山甲上薑水煎以上五方隨症撰用之柴胡枳桔湯蘊要治小結胸脈弦數口苦心下硬痛或胸中滿硬或脅下滿硬發熱或日晡潮熱或往來寒熱耳聾目眩小柴胡湯去人參薑棗加瓜蔞實枳殼桔梗心下滿硬加枳實黃連生薑小陷胸湯傷寒論小結胸病正在心下按之則痛脈浮滑方見前陷胸湯千金治胸心下結聚飲食不消大黃栝蔞實黃連各二兩甘遂一兩上水煎大陷胸湯傷寒論膈內拒痛胃中空虛客氣動膈短氣煩躁心中懊憹陽氣內陷心下因硬則為結胸傷寒結胸熱實脈沉而緊心下痛按之石硬大黃六兩芒硝一升甘遂一錢匕上三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服白散同寒實結胸無熱症桔梗三分巴豆一分去皮心熬黑研如脂貝母三分上三味為散內巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯罨法寒溫條辨結胸不同寒熱虛實遲早便用生薑蔥白等分生蘿蔔加倍如無以子代之三味共搗一處炒熱白布包作餅罨胸前結痛處此法須分二包冷則轉換無不即時開通但不宜大熱恐炮烙難受也更以溫手順下揉之自無不愈並治一切痞滿脹痛真妙法也以上七方隨症選用之清中安蛔湯傷寒辨法治胃實熱嘔吐長蟲黃連薑汁炒三錢黃柏酒炒減半枳實麥炒二錢烏梅三個川椒炒三十粒上薑水煎案此方吐下蛔蟲者兼用亦佳清胃瀉火湯回春治上焦實熱口舌生瘡腫痛者並咽喉牙齒耳面腫痛皆效連翹桔梗黃連黃芩梔子玄參升麻生地薄荷甘草乾葛上水煎服加減涼膈散同治三焦火盛口舌生瘡連翹黃芩梔子桔梗黃連薄荷當歸枳殼芍藥生地甘草各等分水煎食遠服柳花散外科十法治喉瘡並口舌生瘡青黛蒲黃黃柏人中白各一兩冰片五分硼砂五錢共為細末吹喉極效以上口舌糜爛者宜之承氣養榮湯溫疫論治裡熱未盡血燥小承氣湯合四物湯去川芎加知母麻子仁丸傷寒論趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻子仁二升芍藥半斤枳實半斤炙大黃一斤去皮厚朴一尺去皮杏仁一升去皮尖熬別作脂上六味蜜和丸如梧子大飲服十丸日三服漸加以知為度以上二方下利止後數日大便不通者宜之抵當湯同太陽病六七日表症仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也小便自利其人如狂者血證諦也陽明症其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑水蛭熬虻蟲各三十個去翅足熬桃仁二十個去皮尖大黃三兩酒洗上四味以水五升煮取三升去滓溫服一升不下更服抵當丸同傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥水蛭二十個熬虻蟲二十個去翅足熬桃仁二十五個去皮尖大黃三兩上四味搗分四丸以水一升煮一丸取七合服之脺時當下血若不下者更服桃核承氣湯同太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但少腹急結者乃可攻之方見前小品芍藥地黃湯外臺療傷寒溫病應發汗而不發之內瘀畜血鼻衄吐血面黃大便黑芍藥三分地黃半斤牡丹皮二兩犀角一兩屑上水煎即千金犀角地黃湯喜忘如狂者加大黃黃芩崔氏療卒傷熱行來尿血外臺大黃末芒硝末各半匙上冷水和頓服之立止當歸承氣湯丹溪附余治尿血實者大承氣湯加當歸桃仁湯溫疫論治邪干下焦血分溺血畜血桃仁三錢阿膠二錢丹皮當歸赤芍滑石各一錢上水煎服如少腹痛按之硬痛小便自調有畜血也加大黃三錢大柴胡湯直指男女諸熱出血血熱蘊隆柴胡半斤黃芩三兩人參三兩半夏半斤洗甘草炙生薑各三兩切大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服茜根散聖惠治小兒吐血心躁煩悶茜根半兩犀角屑升麻大黃黃芩甘草各一分上黑豆三十粒淡竹茹半分水煎瀉心湯金匱治主心氣不足吐血衄血方見前云歧子脈訣加生地黃名犀角地黃湯治血積胸中熱甚苦參湯聖濟治大衄口耳皆血出不止苦參黃連大黃各一兩梔子七枚上水一盞入生地黃汁一合煎至七分去滓溫服以上數方熱入血分發狂並諸出血者隨症選用之救急諸方增補走馬湯金匱附方療中惡心痛腹脹大便不通杏仁二枚巴豆二枚上二味以綿纏槌令碎熱湯二合捻取白汁飲之當下老少量之通治飛尸鬼擊雞峰普濟方本方面糊為丸名杏仁丸治瀉兼吐又楊氏家藏方硃砂圓治大人小兒暴下水瀉及積利即本方棗肉為丸如芥子大硃砂為衣每服一丸倒流水下三物備急丸同主心腹卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口噤停尸卒死大黃一兩乾薑一兩巴豆一兩去皮心熬研如脂上藥各須精新先搗大黃乾薑為末研巴豆內中合治一千杵用為散蜜和丸亦佳密器中貯之莫令泄氣紫丸千金赤石脂代赭石各一兩巴豆三十粒杏仁五十粒上為末巴豆杏仁別研為膏相和更搗二千杵入少蜜同搗之密器中收紫雪外臺治發斑咽痛及暑中三陽腳氣煩躁升麻六錢黃金十兩寒水石石膏各四兩八錢犀角羚羊角各一兩玄參一兩六錢沉香木香各五錢甘草八錢丁香五錢水五盞先煮黃金至三盞入諸藥再煎至一盞去滓入芒硝三兩二錢慢火煎以柳木攪不停手候欲凝入磁盆中更下硃砂麝香末各三分急攪令勻候冷凝結成雪每一錢細細咽之地漿陶弘景曰此掘黃土地作坎深三尺以新汲水沃入攪濁少頃取清用之羅謙甫曰中暑霍亂乃暑熱內傷七神迷亂所致陰氣靜則神藏躁則消亡非至陰之氣不愈坤為地地屬陰土曰靜順地漿作於牆陰坎中為陰中之陰能瀉陽中之陽也衛生寶鑑金銀煮汁新汲水卻邪調中下熱氣並宜飲之嘉佑本草以上諸方窮鄉僻居並道途無藥之地隨便用之以救一時之急輕者可愈重者亦不死其如地漿金銀煮汁用之煮藥尤佳刺法按刺絡宜要其早若羈遲則難及其或手或足覓其青筋怒張者刺之靈樞經脈篇曰諸刺絡脈者必刺其結上甚血者雖無結急取之以瀉其邪而出其血此軒歧之古法也宜用此法又後世方書有刺少商委中十指尖等之法亦宜參用焉豫觀去秋來世醫行刺絡往往於委中穴宜施之既遲多在厥冷脈伏之後故雖刺之血不多出其適出者僅見紫黑血點一二滴厥冷不復而人既斃者往往有焉又有挑法刮法等詳見於説疫今不録焉以手蘸溫水於病人膝腕用力拍打有紫黑所以針刺去惡血滋德堂堂方委中穴出血或十指頭出血皆是良法醫學源流肯綮大成體厥脈厥等症則刺少商穴並十指上薄肉當中刺之血出如血不出可攝出之皆效説疫除穢薰法凡瘟疫盛行之地邪穢氣滿於空中亡論房室故雖平素節養得宜數經歷其地或訪病看病則穢氣從鼻口入終感其邪者間有焉況晝夜扶持養護與之同床同廁者乎防之之法宜於病者之旁常焚除穢之藥莫令其氣少絶庶幾免穢氣入口鼻矣是所以除穢熏法之不可無也今録簡便者數方蒼降反魂香説疫除穢祛疫蒼朮降真香各等分共末揉入芥葉內綿紙捲筒燒之避瘟丹同燒避瘟法邪乳香蒼朮細辛生草川芎降真白檀棗肉丸焚燒避瘟丹同燒之能避一切穢惡邪氣蒼朮乳香細辛甘松藝香降真各等分糊為丸豆大每用一丸焚之良久又焚一丸略有香氣即妙一方同天行時疫宅舍怪異並燒降真香有驗又云房中不可燒諸香只宜焚降真諸香治驗系正症者二條系變局者十二條安部某室年三旬余六月末患帶下至七月漸愈氣力猶未復八月初忽然洞泄數行延醫多和田某療之三四日瀉益甚晝夜凡二十餘行加之以吐藥水不入口某告術盡於是請豫診之脈頗數舌上無胎渾作緋帛色腹皮貼背稍渴引冷水豫喻之曰是瀉疫矣恐前藥得無犯熱劑乎主人曰前醫初用附子下利益甚昨夜以來加參數兩爾後加以吐豫笑曰果然若服豫藥不出三日瀉必止因與大柴胡湯五貼冷服次早報曰昨日來下利僅六行吐亦減吃粥數口再與前方三日瀉全止但時時嘔渴因與竹葉石膏湯二日嘔渴止飲食加進氣力大復四五日後吐瀉再發疲困如前飲食全廢主人驚以延豫診之脈復變數豫告曰勿驚伏邪再發無他以前日服熱藥邪伏匿於腸胃間今正氣稍復伏邪再呈其梟也因與大柴胡湯冷服二三日吐瀉全止飲食稍進氣力亦加調理數日飲食益進五六日忽然下利數行疲困倍於初但無吐耳飲食亦廢只吃水數口耳主人以為必死迎豫豫曰甚哉熱藥之為害幸不至厥冷必無虞豫猶有術與調胃承氣湯三貼去次日報曰瀉頗減但氣力愈減猶與前方三日瀉止飲食漸進於是與柴胡養榮湯數日氣力稍稍復前後一月餘全愈荊妻年三十餘八月下旬夜半時時腹痛及曉暴瀉一行下如白醬者五六升且溫溫欲吐診之脈弦數舌上無胎至辰牌凡瀉三四行乍發大渴頻欲熱湯因與冷水一杯續冷服大柴胡湯加芒硝三貼服後發壯熱發汗如流嘔渴減但下利猶數行仍連服前方至晚瀉凡二十餘行舌上生白胎頗厚此夜與大承氣五貼至曉瀉七行疲困頗加飲食不入但昏睡而已臥起待人扶持按其腹猶漉漉有聲次日再與前方巳時小水始通水瀉差有滓然晝夜猶十餘行確守前方三日瀉漸止小便壯利飲食漸進舌胎猶少存因轉與人參飲子去參前後七日飲啖如常氣力全復久保玄貞年卅八月中患洞泄飲食起居不變常自服葛根黃芩黃連湯二三日瀉猶不止請豫治診之脈息如平唇舌清潔豫曰此瀉疫但邪勢頗緩然非芩連之所能治因與大柴胡湯三貼次日報曰疇昔以來瀉減數行溺亦快利於是用小柴胡湯加黃連次日晡時馳價日晚來吐瀉並至疲困殊極請來診豫適不在家男代往焉六脈如絲下部稍冷氣力惙然見其舌白胎稍厚問之家人曰晡時登圊洞泄如傾盆下白漿六七升續吐水三五升聲聞廁外爾後疲困如許男以為此伏邪再呈梟炎蓋前日蕩滌之力未足爾再投大柴胡湯三貼此夜吐泄猶十行及曉再投前方更加芒硝二貼而歸次日豫往診之舌胎減半吐瀉亦減第疲困益加六脈如絶重按僅應眼陷頰削不能起床問其飲食則前夜以來僅吃粥清數口耳若強與之則吐出不收家人以為必死豫曰無恐邪勢頗減再投前方五貼次日復往診之舌胎全去色如緋帛手足稍溫問其大便猶十餘行時時乾嘔但昨夜以來大便少生渣滓小便亦二行豫喜曰益佳矣猶確守前方三日吐瀉全止稍吃稀粥葛湯等於是轉換柴胡清燥湯調理數日飲食漸加氣力全復一瞽某年二十餘身體肥盛一日洞泄三四行自以為太陽陽明合病服葛根湯二日瀉猶不止延醫程田某治之醫曰病屬少陰非附子不能治與真武湯三貼去服後瀉益劇加以吐逆半日許吐瀉凡二十餘次所瀉皆如敗醬煩渴引飲心中懊憹煩悶不安床加之胸膈作痛頰肉如屑聲乍啞疲困頓加因請診於豫脈伏如絲四心青黑足踝以下微冷小腹虛濡舌上白胎以指摩之冷如冰強硬不能言每一言語必嗽冷冰而後始言自以為必死適金田生來診之曰病既危然今認煩渴一症與白虎湯加人參或萬中有一生豫從傍詰之曰今以煩渴一症擬白虎加人參非不是然白虎湯特在清肅膈間散漫之熱耳恐藥力猶慢未足抵當邪勢其與白虎湯寧與冷水況人參非此症之所宜乎生怫然作色曰然則無治法頃刻必死豫哂曰否今此症雖六脈沉伏四肢稍冷其實乃熱實之極非下劑不能救何為必無治法子以此等為死證則世間無可治之瀉疫何則此症邪勢本緩故初服葛根湯瀉雖不止猶不加劇今乃非硝黃斷不可也而子以真武湯與之是猶滅火添油抱薪救火徒助邪炎以至此極也而猶未悟今又欲以白虎湯換之抑子以此症為寒乎為熱乎奚其治之矛盾也若使治之其死可立而待耳夫認瀉為寒認渴為熱此不知醫者之見也古人不言乎見熱無治熱見寒無治寒豫不復與子言子宜速去而刮目以視豫成功生益怒日諾請待之遂大蹈步而去豫告家人曰病人素常必有寒飲故邪並於飲以結膈間仲景所謂寒實結胸症也而以薑附治之誤治之所致實可憫也今欲救之非大陷胸則不可治若少遲則死家人唯唯因與大陷胸湯三貼下利頓止時嘔吐涎沫痛猶未減次日再與前方兼投三物白散下咽須臾昏悶半時許舉體振栗四支不收家人倉黃扶持之數刻苦悶煩亂不忍見之忽一聲大叫徹於四鄰家人驚走視之吐出白水二三升恰如敗漿振栗頓止膈痛失半豫喜曰藥力得當於疾最佳微不可驚再與前方而歸此夜大便一行熟睡徹曉鼾聲不異常但時時振栗嘔渴猶在至翌日痛減七八分因與大柴胡合小陷胸湯數服痛全去但嘔渴反加劇聞藥氣亦嘔加之以厄逆家人再驚豫喻之曰是胃中餓虛餘熱不去之所致不足患仍轉與竹葉石膏湯半日許而小溲快利此夕厄亦息始食粥一碗猶與前方數日全愈松田某妻年三旬余一日舉體發斑次日吐瀉交至豫診之脈沉緊手足熱與大柴胡湯五貼吐瀉漸斷忽發胸膈痛呻吟不安床驚以請再診診之心下頗硬按之則痛益甚以為邪結宿飲與大陷胸湯二貼痛頓去飲食稍進而斑猶出沒再與大柴胡湯加葛根二三日而全愈一兒二歲忽然尿血二行面色青慘乳哺不進啼聲不出舉身振顫恐惶請治診之六脈沉伏唇舌清潔更無熱候以為此亦瀉疫之變局蓋邪氣伏於裡陽氣鬱壅不伸熱逼下焦血分之所致與外臺崔氏療卒傷熱往來尿血方服後振顫頓止啼聲漸出半時許小溲清利氣宇稍加乳哺嬉戲全復常因憶去夏五月一兒七歲雨後入渠中弄水忽發腹痛因請一醫曰胃中虛寒之候與藥數貼服後痛益劇且數登圊家人視之所下盡鮮血倉黃請治豫診之通身冰冷脈沉如絲口渴好冷唇舌潔淨無胎按其腹則痛滋益甚展轉不安床豫亦不解為何等症意是邪犯血分之症也因與桃仁承氣湯數貼痛稍減翌日遂死如此兒疑亦與彼兒同因若不經前醫之誤治則或可以得救療焉不堪遺憾因並以記曲坊薪商某老母年八十吐瀉數行自炙天樞氣海而吐瀉漸斷次日夜半卒發振栗欲言則厄逆其狀幾危殆延豫請治四肢不厥脈亦平但舌上白胎頗厚因憶此人下焦素實邪亦緩故雖一時為炙炳吐瀉斷反助邪炎以逼於陽氣鬱塞及於此也先與大柴胡湯加芒硝二服而大便快利至次日舌胎去全愈同坊某妻年四十餘卒然頭眩昏倒舉體轉筋兼麻痹延豫治之六脈沉伏以為邪氣鬱於陽明陽氣壅閉不伸之候與白虎湯二服而壯熱如燒忽發狂欲逾牆走口出不倫之言家人恐惶豫喻之曰勿驚是熱犯下焦血分耳因轉與桃核承氣湯二服大便猶不通胸腹發痛更與備急丸數十粒須更快吐一二升爾後熱睡此夜快下臭便一行次日豁然愈同坊一槍匠某年五十餘黃昏醉而寢半夜卒然發振栗肉上粟起四肢拘急不伸續吐瀉頻並至家人恐怖不知所措急雇鄰人以迎豫診之六脈俱伏厥冷致額舌上白胎但胸腹微溫耳時時引衣自覆家人欲大艾炎天樞豫止之曰不可此症雖似寒其實純熱蓋邪氣鬱於表裡陽氣被束不得伸也厥振何足患與大柴胡湯加葛根二貼而去次日遣門生某診之及報曰昨夜服藥後發汗流離吐瀉隨而止今朝食粥數碗但猶少存舌胎耳再與前方三貼愈揖斐某室年二十八一日洞泄一行飲食起居無異措而不治越一日低然發腹痛痛從小腹上衝心發則令人坐腹上以膝壓之僅堪其痛耳延醫伴野某治之謂為血積與藥服之數貼更無寸驗於是使瞽者針刺一晝夜凡針至二百餘刺每一刺針曲如鉤而痛猶不減瞽者驚曰此非針刺之所能治於是延豫請治診之兩手脈沉緊胸腹硬滿如墩狀每痛發按之如有頭足者蠢動舌上白胎乾燥而不渴但時時煩熱耳問其大便曰四日前洞泄一行爾後不通小便赤濁短少豫曰是非血積瀉疫之變局也蓋無吐瀉故邪毒內郁爾非峻下不治先與備急圓數十粒續作大承氣五貼而去次日往訪之曰昨夜服所賜藥二貼大便一行痛減六七又服三貼夜半至曉大便凡三行皆水瀉痛全止食粥二碗診之脈稍緩舌胎生津腹滿減半但胸下兩筋怒張按之則猶少痛因轉與大柴胡加芒硝湯倍加芍藥三貼而全愈煆匠某年四旬余下利數行臭穢沖鼻請一醫治之不知與何等藥下利忽止半日許四肢轉筋腰腳痠疼晝夜苦悶既而小腹急痛四肢逆冷諸藥不效易醫數人皆投溫熱藥病彌增劇於是請豫治診之其脈沉伏煩渴欲水舌胎乾裂小便赤濁飲食不進殆屬危險因想此症前醫誤治強止其利熱邪鬱於下焦血為之瘀滯筋脈失養以致轉筋宜用清熱散瘀之藥而反投熱劑陽氣愈郁邪氣愈張今以舌裂小便赤濁驗之熱邪逼下焦無可疑因與桃核承氣湯三貼此夜黑便滑通轉筋腰疼如忘厥亦復次日往診之脈稍出舌上生津午時始吃粥一小盅但小便猶赤濁短少因與豬苓湯三貼小便快利飲食加進調理四五日全差侍醫佐田玉安年五旬余七月來患齦疸舌下爛蝕飲食漸減疲羸日加百治無效請數醫皆以為不治至十月中請豫治豫以為結毒上郁與歸靈湯兼服結毒紫金丹十旬余一日蝕處俄然迸出鮮血一二升乃子驚惶迎豫以豫不在家男往診之手足厥冷六脈沉伏精神昏憒按其腹水分動築如奔馬因作獨參湯加犀角數分與之須臾厥回脈出因與回春犀角地黃湯此夜脈全復精神亦漸加次日與十全大補湯以鮮地黃代熟地黃猶兼與紫金丹乃子又質之一口科曰齦疽出血是虛火上炎之所為不足深怪第如嚴君之症病勢極虛劇疲羸殊甚若及再三恐至不可請豫熟慮請勿易視之然而飲食稍進氣力稍益動作又減子竊以為未必然也轉與本朝經驗革解湯四五日後兩腿筋縮有時痛如刺嚬蹙叫其苦且心膈溫溫時時欲吐豫不解其何故想是毒氣逼心之症試使服犀角數分及晚全止此夜大便一行硬通續水瀉二行次早亦水瀉一行動作復加乃子驚以為脾胃虛衰之候或歸咎於鮮地黃犀角一醫來診曰脾胃既虛衰假令不服鮮地黃犀角亦必至於此喻家人曰死不出於十旬外謝而去此日豫亦往診之舌上少有白胎乾燥小便則濁短少豫以為決非虛衰之候然脈息無變亦無寒熱之候心疑之或是瀉疫猶與前方而歸次早乃子來曰夜中亦水瀉二行及曉復一行飲食漸減疲羸又加豫翻然悟曰豫過矣豫過矣是感瀉疫無疑也因憶前日之出血也動築也筋縮也噁心也皆是邪氣逼血分之候然今時令向寒邪熱頗慢故不至劇作調胃承氣湯一貼與之曰豫當往診之宜先服之午後往之且問曰前藥服盡否耶乃子曰前藥有硝黃此疲羸之極恐不堪其峻且病者亦不肯服故欲待子來決之豫因診之舌胎雖薄稍乾燥水分動頗高因姑謂病者曰前藥以有硝黃不肯服今宜與他藥然有邪氣非柴胡不可豫當作小柴胡湯敢服耶否病者頷之因竊喻乃子曰嚴君症果是新感瀉疫也其實非硝黃斷弗能治也若顧其尩羸而不服之則必斃然豫但恐子納先人之言不敢進之若從豫言今作劑不然則已別無治法乃子懇請曰謹奉教於是與大柴胡加芒硝湯二貼而去次日往問之曰昨夜服所賜之藥以來水瀉全息今朝下白膿數滴耳余笑曰果如豫言再與前方三貼次日其次子來謝曰昨夜大便一行滑通其色如膠爾後腰腿攣痛全止夜半後熟睡達曉水分動築亦減今朝食粥數口氣力亦加仍與千金竹葉湯三貼晡後使男往診之舌胎全去膿稍和大便前夜以來不通小便色稍薄飲食漸加精神頗益次日復與前方凡四日而新病全解因再與治本病藥佐野某老母年七十八來客於古山氏一日晚餐後吐瀉六七行四肢冰冷驚惶請治診之脈沉緊舌上白胎寒栗鼓頷屢引被自覆豫曰是外雖寒內則熱宜先表裡雙解必發一陳熱而解作大柴胡加葛根一服厥回須臾壯熱如燒濈然汗出豫曰益佳再與前方二貼而去次早往診之諸症頓解但胎猶存耳因與人參飲子去參二日而差安藤某老母年七十五四月中患疫至六月再復爾後猶在褥中秋前一日卒然吐瀉數次請治於岡田氏使門人往診而與藥服之吐出不納疲困殊益因又延一醫診之曰年高虛羸之餘受此症無術之可施大劑參附或可救萬之一與藥三貼而去服之吐益甚此夜盡三服下部冰冷目視不了口流清水不能言語瀉漸斷但煩悶耳家人驚惶請治於豫時既昏黑使男往診之脈伏如絶重按僅得舌上胎滑足冷過膝小腹虛濡因先與梔子豉湯加枳實二貼初服吐出再服下咽食頃煩悶漸止大便二行水瀉猶時時煩悶因作前方二貼兼與當歸承氣湯三貼而去次日豫往診之厥回脈出大便亦調但時時猶吐清水見舌上苔減半因與竹葉石膏湯飲食漸進小便始利新病頓解但病羸之餘氣力未復常耳鈴木某兒年周歲一朝吐乳再三後昏憒不省人事乳哺不進啼聲不出時時微搐因上竄一醫作漫驚與沉香天麻湯症益加劇因請豫診治之其脈殆絶口唇乾燥小腹虛軟心下反急按之則微喘豫哂曰此非慢驚瀉疫也蓋前醫之藥有參附之熱藥引邪逼胸也搐止始熟睡次日與千金竹葉湯三日而嬉戲復常工師某兒二歲一日吐瀉數行氣力惙然時時微搐延一醫治之醫戒曰是脾胃虛極慢驚之漸與藥而去膽藥二三日吐乳益劇瀉亦倍前日且所瀉盡乳色全無糞色加之喉中涎鳴有時目向上插驚以請治豫診之脈沉數如絲眼慢氣怯舌上清潔但唇口乾燥心腹無熱且虛軟問其乳哺曰能乳問其小便曰赤濁短少豫曰是非脾胃虛極瀉疫內郁之症前藥得無熱劑耶檢之果附子理中湯加薑蠶豫曰此症服此藥猶火上添油宜哉證加劇因與大柴胡合小陷胸湯次早掖兒來謝曰昨服藥一服盡吐出再與一貼不吐爾後吐止便色變黃昨夜始熟睡無復微搐痰涎亦止再與前方三日而瀉止氣力復豐藤某兒三歲感冒延兒科小達某治之服藥二日吐乳不止又經一日水瀉數行驚以請治豫診之脈弦數舌上無胎腹部無熱但虛理動築應衣問其小便曰赤濁短少問乳哺曰不進因先與大柴胡湯二日吐止瀉猶不減時腹痛且加身熱豫以為此燥結猶存故瀉未欲止前方加芒硝與之服後大便一行如臍糞狀爾後止乳哺進嬉戲如常但微熱仍存因與九味清脾湯二日而差
